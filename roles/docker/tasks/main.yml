---
- block:
    - set_fact:
        ansible_user: "{{ lookup('env','USER') }}"
        os_codename: "{{ ansible_lsb.codename | lower }}"

    # for trixie there is no docker image yet
    - set_fact:
        os_codename: bookworm
      when: "os_codename == 'trixie'"

    - name: Install packages for docker download n installation
      package:
        name: "{{ item }}"
      loop:
        - gnupg2
        - apt-transport-https
        - ca-certificates
        - curl

    - name: check if docker is installed
      command: docker --version
      register: docker_installed_check
      changed_when: false
      failed_when: false

    - name: set docker installation availability
      set_fact:
        docker_installed: "{{ docker_installed_check.rc == 0 }}"

    - name: probe docker repository signing key endpoint
      uri:
        url: https://download.docker.com/linux/ubuntu/gpg
        method: HEAD
        timeout: 30
      register: docker_repo_probe
      failed_when: false
      environment: "{{ proxy_env }}"

    - name: set docker repository availability
      set_fact:
        docker_repo_reachable: "{{ (docker_repo_probe.status | default(-1)) == 200 }}"

    - name: fail when docker repository is unreachable and no local upgrade fallback exists
      fail:
        msg: "Docker repository is unreachable and no local Docker fallback is available."
      when: not docker_repo_reachable and not (installation_mode == "upgrade" and docker_installed)

    - name: report local docker fallback during upgrade
      set_fact:
        upgrade_warnings: >-
          {{
            ((upgrade_warnings | default([])) + [
              "Docker repository unreachable (download.docker.com); keeping local Docker version."
            ]) | unique
          }}
      when: not docker_repo_reachable and installation_mode == "upgrade" and docker_installed

    - name: report local docker fallback during upgrade
      debug:
        msg: "Using existing local Docker because repository access is unavailable during upgrade."
      when: not docker_repo_reachable and installation_mode == "upgrade" and docker_installed

    - name: adding docker apt signing key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/trusted.gpg.d/docker.asc
        force: true
        mode: "0644"
      environment: "{{ proxy_env }}"
      when: docker_repo_reachable

    - name: add docker repo
      lineinfile:
        path: "/etc/apt/sources.list.d/docker.list"
        regexp: ".*https://download.docker.com/linux/.*"
        create: true
        line: "deb [arch=amd64] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ os_codename }} stable"
      when: docker_repo_reachable

    - name: apt update
      apt: update_cache=true
      environment: "{{ proxy_env }}"
      when: docker_repo_reachable

    - name: Install all packages for docker
      package:
        name: "{{ item }}"
      loop:
        - docker-ce
        - docker-ce-cli
        - containerd.io
      when: docker_repo_reachable

    - name: Add the group 'docker' for {{ ansible_user }} and {{ fworch_user }} to allow running docker
      user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop:
        - "{{ ansible_user }}"
        - "{{ fworch_user }}"

    - name: set proxy for docker daemon to get images via proxy
      import_tasks: set-docker-daemon-proxy.yml
      notify: "docker restart"

    - name: set docker daemon bridge network
      import_tasks: set-docker-daemon-network.yml
      when: docker_network is defined and docker_network | length > 0

    - name: include upgrade script
      import_tasks: run-upgrades.yml
      when: "installation_mode == 'upgrade'"

  become: true
