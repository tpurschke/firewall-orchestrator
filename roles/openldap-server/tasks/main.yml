---
- name: Add OS specific OpenLDAP variables
  include_vars: "{{ ansible_os_family }}.yml"

- name: Create universal ldif directory
  file:
      path: "{{ middleware_ldif_dir }}"
      state: directory
      owner: "{{ fworch_user }}"
      group: "{{ fworch_group }}"
  become: true
  tags: ["test", "integrationtests"]

- block:
      ### OS basics
      - name: Install the openldap and required Packages
        package:
            name: "{{ item }}"
            state: present
        loop: "{{ openldap_server_pkgs }}"

      ### Clean up slapd.d

      - name: Create the empty configuration directory
        file:
            path: "{{ openldap_server_app_path }}/slapd.d"
            state: "{{ item }}"
        with_items:
            - absent
            - directory

      - name: Create directory for ldap pid
        file:
            path: "/var/run/slapd"
            state: directory
            owner: "{{ openldap_server_user }}"
            group: "{{ openldap_server_user }}"

      ### Root password
      - name: Check if manager password exist
        stat:
            path: "{{ ldap_manager_pwd_file }}"
        register: is_manger_pw_present_flag

      - name: Decide on random manager password
        set_fact:
            openldap_server_random_rootpw: "{{ randomly_generated_pwd }}"
        when: not is_manger_pw_present_flag.stat.exists

      - name: Write random manager password to file
        copy:
            content: "{{ openldap_server_random_rootpw }}"
            dest: "{{ ldap_manager_pwd_file }}"
            mode: "0600"
            owner: "{{ fworch_user }}"
            group: "{{ fworch_group }}"
        when: not is_manger_pw_present_flag.stat.exists
        tags: ["test"]

      - name: Generate the root password hash for the config
        command: "slappasswd -T {{ ldap_manager_pwd_file }}"
        register: root_password

      ### TLS
      - name: Create ldap certificates
        include_role:
            name: openssl-cert
        vars:
            openssl_cert_path: "{{ openldap_server_cert_path }}"
            openssl_user: "{{ openldap_server_user }}"
            openssl_cert_mode: "{{ ldap_tls_certificate.mode }}"
            openssl_force_renew: "{{ ldap_tls_certificate.force_renew }}"
            openssl_cert_src: "{{ ldap_tls_certificate.cert_src }}"
            openssl_cert_content: "{{ ldap_tls_certificate.cert_content }}"
            openssl_private_key_src: "{{ ldap_tls_certificate.key_src }}"
            openssl_private_key_content: "{{ ldap_tls_certificate.key_content }}"
            openssl_chain_src: "{{ ldap_tls_certificate.chain_src }}"
            openssl_chain_content: "{{ ldap_tls_certificate.chain_content }}"
            openssl_trust_ca_file: "{{ ldap_tls_certificate.trust_ca_installed_path if ldap_tls_certificate.trust_ca_src | length > 0 or ldap_tls_certificate.trust_ca_content | length > 0 else internal_ca_trust_cert }}"
            openssl_private_key: "{{ openldap_server_private_key }}"
            openssl_csr: "{{ openldap_server_csr }}"
            openssl_country: "{{ openldap_server_country }}"
            openssl_state: "{{ openldap_server_state }}"
            openssl_location: "{{ openldap_server_location }}"
            openssl_organization: "{{ openldap_server_organization }}"
            openssl_email_address: "{{ openldap_server_email_address }}"
            openssl_common_name: "{{ openldap_server }}"
            openssl_subject_alt_names:
              - "DNS:localhost"
              - "IP:127.0.0.1"
              - "{{ 'IP:' ~ openldap_server if openldap_server is match('^\\d{1,3}(\\.\\d{1,3}){3}$') else 'DNS:' ~ openldap_server }}"
            openssl_cert: "{{ openldap_server_cert }}"
        when: openldap_server_enable_ssl | bool

      ### Config files
      - name: Create the directory for ldap database
        file:
            path: "/var/lib/ldap/{{ openldap_server_domain_name }}/"
            state: directory
            owner: "{{ openldap_server_user }}"
            group: "{{ openldap_server_user }}"

      - name: Create the DB_CONFIG file
        copy:
            src: DB_CONFIG
            dest: /var/lib/ldap/{{ openldap_server_domain_name }}/DB_CONFIG
            owner: "{{ openldap_server_user }}"
            group: "{{ openldap_server_user }}"

      - name: Copy slapd.d initial file to system if not present
        template:
            src: config.ldif.j2
            dest: "{{ openldap_server_app_path }}/slapd.d/config.ldif"
            force: false
            mode: 0640

      - name: Configure LDAP protocol, URI and port
        lineinfile:
            path: /etc/default/slapd
            regexp: "^SLAPD_SERVICES="
            line: 'SLAPD_SERVICES="{{ openldap_server_services }}"'

      - name: Initialize ldap config
        command: slapadd -F {{ openldap_server_app_path }}/slapd.d -n 0 -l {{ openldap_server_app_path }}/slapd.d/config.ldif

      - name: Change slapd files permissions to openldap
        file:
            path: "{{ openldap_server_app_path }}/slapd.d"
            state: directory
            recurse: true
            owner: openldap

      ### systemctl
      - name: Remove Debian slapd override
        file:
            path: /etc/systemd/system/slapd.service.d/override.conf
            state: absent
        when: ansible_facts['distribution'] == "Debian"

      - name: Create dir to enable TLS for slapd service
        file:
            path: /etc/systemd/system/slapd.service.d
            recurse: true
        when: ansible_facts['distribution'] != "Debian"

      - name: Enable TLS for slapd service
        template:
            src: override.conf.j2
            dest: /etc/systemd/system/slapd.service.d/override.conf
        when: ansible_facts['distribution'] != "Debian"

      - name: Verify LDAP certificate against configured issuer CA
        command: "openssl verify -CAfile {{ ldap_tls_certificate.trust_ca_installed_path if ldap_tls_certificate.trust_ca_src | length > 0 or ldap_tls_certificate.trust_ca_content | length > 0 else internal_ca_trust_cert }} {{ openldap_server_cert }}"
        register: ldap_cert_verify
        changed_when: false

      - name: Validate slapd configuration before service start
        command: "slaptest -u -F {{ openldap_server_app_path }}/slapd.d"
        register: slapd_config_test
        changed_when: false

      - name: Start the slapd service
        block:
            - name: Restart and enable slapd
              systemd:
                  name: slapd
                  state: restarted
                  enabled: true
                  daemon_reload: true
        rescue:
            - name: Read rendered slapd unit
              command: systemctl cat slapd
              register: slapd_unit
              changed_when: false
              failed_when: false

            - name: Read slapd systemd status
              command: systemctl status slapd --no-pager -l
              register: slapd_status
              changed_when: false
              failed_when: false

            - name: Read slapd journal
              command: journalctl -xeu slapd.service --no-pager -n 100
              register: slapd_journal
              changed_when: false
              failed_when: false

            - name: Validate slapd config with slaptest
              command: slaptest -F {{ openldap_server_app_path }}/slapd.d -u
              register: slapd_slaptest
              changed_when: false
              failed_when: false

            - name: Fail with slapd diagnostics
              fail:
                  msg:
                      - "slapd failed to start"
                      - "systemctl cat slapd: {{ slapd_unit.stdout | default('') }}"
                      - "systemctl status slapd: {{ slapd_status.stdout | default('') }}"
                      - "journalctl -xeu slapd.service: {{ slapd_journal.stdout | default('') }}"
                      - "slaptest -F {{ openldap_server_app_path }}/slapd.d -u: {{ slapd_slaptest.stdout | default('') }} {{ slapd_slaptest.stderr | default('') }}"

  become: true
  when: installation_mode == "new"

- name: Create ldap certificates
  include_role:
      name: openssl-cert
      apply:
        become: true
  vars:
      openssl_cert_path: "{{ openldap_server_cert_path }}"
      openssl_user: "{{ openldap_server_user }}"
      openssl_cert_mode: "{{ ldap_tls_certificate.mode }}"
      openssl_force_renew: "{{ ldap_tls_certificate.force_renew }}"
      openssl_cert_src: "{{ ldap_tls_certificate.cert_src }}"
      openssl_cert_content: "{{ ldap_tls_certificate.cert_content }}"
      openssl_private_key_src: "{{ ldap_tls_certificate.key_src }}"
      openssl_private_key_content: "{{ ldap_tls_certificate.key_content }}"
      openssl_chain_src: "{{ ldap_tls_certificate.chain_src }}"
      openssl_chain_content: "{{ ldap_tls_certificate.chain_content }}"
      openssl_trust_ca_file: "{{ ldap_tls_certificate.trust_ca_installed_path if ldap_tls_certificate.trust_ca_src | length > 0 or ldap_tls_certificate.trust_ca_content | length > 0 else internal_ca_trust_cert }}"
      openssl_private_key: "{{ openldap_server_private_key }}"
      openssl_csr: "{{ openldap_server_csr }}"
      openssl_country: "{{ openldap_server_country }}"
      openssl_state: "{{ openldap_server_state }}"
      openssl_location: "{{ openldap_server_location }}"
      openssl_organization: "{{ openldap_server_organization }}"
      openssl_email_address: "{{ openldap_server_email_address }}"
      openssl_common_name: "{{ openldap_server }}"
      openssl_subject_alt_names:
        - "DNS:localhost"
        - "IP:127.0.0.1"
        - "{{ 'IP:' ~ openldap_server if openldap_server is match('^\\d{1,3}(\\.\\d{1,3}){3}$') else 'DNS:' ~ openldap_server }}"
      openssl_cert: "{{ openldap_server_cert }}"
  when: openldap_server_enable_ssl | bool and installation_mode == "upgrade"

- name: Install the openldap and required Packages for upgrades
  package:
      name: "{{ item }}"
      state: present
  loop: "{{ openldap_server_pkgs }}"
  become: true
  when: installation_mode == "upgrade"

- name: Validate slapd configuration before upgrade service start
  command: "slaptest -u -F {{ openldap_server_app_path }}/slapd.d"
  register: slapd_config_test
  changed_when: false
  become: true
  when: installation_mode == "upgrade"

- name: Start the slapd service for upgrades
  block:
    - name: Restart and enable slapd for upgrades
      systemd:
          name: slapd
          state: restarted
          enabled: true
          daemon_reload: true
  rescue:
    - name: Read rendered slapd unit during upgrade
      command: systemctl cat slapd
      register: slapd_unit
      changed_when: false
      failed_when: false

    - name: Read slapd systemd status during upgrade
      command: systemctl status slapd --no-pager -l
      register: slapd_status
      changed_when: false
      failed_when: false

    - name: Read slapd journal during upgrade
      command: journalctl -xeu slapd.service --no-pager -n 100
      register: slapd_journal
      changed_when: false
      failed_when: false

    - name: Validate slapd config with slaptest during upgrade
      command: slaptest -F {{ openldap_server_app_path }}/slapd.d -u
      register: slapd_slaptest
      changed_when: false
      failed_when: false

    - name: Fail with slapd diagnostics during upgrade
      fail:
          msg:
              - "slapd failed to start during upgrade"
              - "systemctl cat slapd: {{ slapd_unit.stdout | default('') }}"
              - "systemctl status slapd: {{ slapd_status.stdout | default('') }}"
              - "journalctl -xeu slapd.service: {{ slapd_journal.stdout | default('') }}"
              - "slaptest -F {{ openldap_server_app_path }}/slapd.d -u: {{ slapd_slaptest.stdout | default('') }} {{ slapd_slaptest.stderr | default('') }}"
  become: true
  when: installation_mode == "upgrade"

- name: include upgrade script
  import_tasks: run-upgrades.yml
  when: "installation_mode == 'upgrade'"
